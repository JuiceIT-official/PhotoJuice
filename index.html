<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PhotoJuice — Privacy Policy</title>

  <!-- Optional: einfache Styles -->
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 16px; line-height:1.6; }
    pre, code { background:#f6f8fa; padding:6px; border-radius:4px; }
    hr { margin: 2rem 0; }
    footer { margin-top: 48px; padding-top: 16px; border-top: 1px solid #e6e6e6; color: #555; font-size: 0.95rem; display:flex; justify-content:space-between; align-items:center; }
    footer a { color: #0366d6; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main id="content">
    <p>Loading…</p>
  </main>

  <footer>
    <div>© PhotoJuice</div>
    <div><a href="/privacypolicy">Impressum</a> · <a href="/privacypolicy">Privacy Policy</a></div>
  </footer>

  <!-- Marked (Markdown -> HTML) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- DOMPurify (sanitization) -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.0/dist/purify.min.js"></script>

  <script>
    // Pfad zur Markdown-Datei im Repo (absolute Pfadangabe sorgt für Konsistenz)
    const mdUrl = '/privacy.md';

    async function loadMarkdown() {
      try {
        const res = await fetch(mdUrl);
        if (!res.ok) throw new Error('Could not load ' + mdUrl);
        const md = await res.text();

        // Markdown in HTML umwandeln
        const html = marked.parse(md);

        // HTML sanitizen bevor es eingefügt wird
        const clean = DOMPurify.sanitize(html);

        document.getElementById('content').innerHTML = clean;
      } catch (err) {
        document.getElementById('content').textContent = 'Error loading content: ' + err.message;
      }
    }

    loadMarkdown();
  </script>
</body>
</html>
